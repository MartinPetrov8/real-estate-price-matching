<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- House body -->
  <rect x="6" y="20" width="28" height="16" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Roof -->
  <path d="M3 21L20 6L37 21" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="16" y="26" width="8" height="10" rx="1" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Left window -->
  <rect x="9" y="23" width="5" height="5" rx="0.5" fill="none" stroke="#1a1a2e" stroke-width="1.8"/>
  <line x1="11.5" y1="23" x2="11.5" y2="28" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="9" y1="25.5" x2="14" y2="25.5" stroke="#1a1a2e" stroke-width="1"/>
  <!-- Right window -->
  <rect x="26" y="23" width="5" height="5" rx="0.5" fill="none" stroke="#1a1a2e" stroke-width="1.8"/>
  <line x1="28.5" y1="23" x2="28.5" y2="28" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="26" y1="25.5" x2="31" y2="25.5" stroke="#1a1a2e" stroke-width="1"/>
  <!-- Price tag on door -->
  <circle cx="20" cy="30" r="1.8" fill="none" stroke="#1a1a2e" stroke-width="1.2"/>
  <path d="M20 28.2V24.5" stroke="#1a1a2e" stroke-width="1.2"/>
  <path d="M18.5 24.5L20 23L21.5 24.5" fill="none" stroke="#1a1a2e" stroke-width="1"/>
  <!-- Gavel on chimney -->
  <rect x="28" y="8" width="3" height="8" rx="0.5" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Gavel head -->
  <rect x="25.5" y="5" width="8" height="4" rx="1" fill="#1a1a2e"/>
</svg>
