<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страницата не е намерена | КЧСИ Сделки</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./styles.min.css?v=202603022059">
    <style>
        .error-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .error-content { max-width: 500px; }
        .error-icon { font-size: 6rem; margin-bottom: 1rem; }
        .error-title { font-size: 2rem; color: #1a1a2e; margin-bottom: 1rem; }
        .error-text { color: #64748b; margin-bottom: 2rem; line-height: 1.6; }
        .error-btn { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.875rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 600; }
        .error-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="./" class="logo" style="text-decoration: none;">
                    <img src="logo.svg" alt="ЧСИ Търгове" class="logo-icon" width="28" height="28">
                    <div class="logo-text">
                        <span class="logo-name">КЧСИ Сделки</span>
                        <span class="logo-tagline">Изгодни имоти от търгове</span>
                    </div>
                </a>
            </div>
        </div>
    </header>

    <main class="error-page">
        <div class="error-content">
            <div class="error-icon">🔍</div>
            <h1 class="error-title">Страницата не е намерена</h1>
            <p class="error-text">Страницата, която търсите, не съществува или е била преместена. Проверете адреса или се върнете към началната страница.</p>
            <a href="./" class="error-btn">Към началната страница</a>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 КЧСИ Сделки. Неофициален инструмент за търсене.</p>
            </div>
        </div>
    </footer>
<script src="analytics.min.js?v=202603022059"></script>
</body>
</html>
