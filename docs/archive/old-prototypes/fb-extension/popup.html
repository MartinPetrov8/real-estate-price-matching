<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImotWatch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      max-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .header-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    
    .header-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    
    /* Stats */
    .stats {
      background: white;
      padding: 12px 16px;
      display: flex;
      gap: 16px;
      border-bottom: 1px solid #eee;
    }
    
    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #666;
    }
    
    .stat-value {
      font-weight: 600;
      color: #333;
    }
    
    /* Filters */
    .filters {
      background: white;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      background: #f0f0f0;
      border: none;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      color: #555;
    }
    
    .filter-btn.active {
      background: #667eea;
      color: white;
    }
    
    /* Listings */
    .listings {
      max-height: 350px;
      overflow-y: auto;
    }
    
    .listing {
      background: white;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .listing:hover {
      background: #f9f9f9;
    }
    
    .listing-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    
    .listing-type {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .listing-type-icon {
      font-size: 16px;
    }
    
    .listing-price {
      font-weight: 700;
      color: #667eea;
    }
    
    .listing-location {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    
    .listing-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .listing-time {
      font-size: 11px;
      color: #999;
    }
    
    .listing-group {
      font-size: 11px;
      color: #999;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .listing-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .badge-sale {
      background: #e3f2fd;
      color: #1565c0;
    }
    
    .badge-rent {
      background: #f3e5f5;
      color: #7b1fa2;
    }
    
    .badge-wanted {
      background: #fff3e0;
      color: #ef6c00;
    }
    
    /* Empty state */
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #999;
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .empty-state p {
      font-size: 13px;
      line-height: 1.5;
    }
    
    /* Footer */
    .footer {
      background: white;
      padding: 12px 16px;
      border-top: 1px solid #eee;
      text-align: center;
    }
    
    .footer-link {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    
    .footer-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏠 ImotWatch</h1>
    <div class="header-actions">
      <button class="header-btn" id="refreshBtn" title="Refresh">🔄</button>
      <button class="header-btn" id="clearBtn" title="Clear all">🗑️</button>
    </div>
  </div>
  
  <div class="stats">
    <div class="stat">
      📊 <span class="stat-value" id="totalCount">0</span> listings
    </div>
    <div class="stat">
      🆕 <span class="stat-value" id="todayCount">0</span> today
    </div>
  </div>
  
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="sale">For Sale</button>
    <button class="filter-btn" data-filter="rent">For Rent</button>
    <button class="filter-btn" data-filter="wanted">Wanted</button>
  </div>
  
  <div class="listings" id="listingsContainer">
    <div class="empty-state">
      <div class="empty-state-icon">🔍</div>
      <p>No listings found yet.<br>Browse Facebook real estate groups to start collecting.</p>
    </div>
  </div>
  
  <div class="footer">
    <a href="#" class="footer-link" id="dashboardLink">View all in dashboard →</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
